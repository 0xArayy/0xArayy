name: Update Terminal GitHub Stats

permissions:
  contents: write

on:
  schedule:
    - cron: "47 2 * * *"
  workflow_dispatch:

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v5
        with:
          path: profile
          fetch-depth: 0

      - name: Checkout generator repo
        uses: actions/checkout@v5
        with:
          repository: yogeshwaran01/github-stats-terminal-style
          path: generator

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: generator/package-lock.json

      - name: Install dependencies
        working-directory: generator
        run: npm install

      - name: Build generator
        working-directory: generator
        run: npm run build

      - name: Generate terminal stats SVG
        working-directory: generator
        env:
          GHT: ${{ github.token }}
        run: node dist/bin/github-stats-terminal.js ${{ github.repository_owner }} hacker

      - name: Copy SVG to profile repo
        run: cp generator/github_stats.svg profile/github_stats.svg

      - name: Commit and push updated SVG
        working-directory: profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_stats.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(profile): update terminal stats svg"

          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:$BRANCH"
